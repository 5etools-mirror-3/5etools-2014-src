name: 5e2014

services:
  5etools:
    container_name: 5e2014
    image: 5e2014
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8214:80" # where 8214 is the port on the machine and 80 is the internal port of the container. 